<!DOCTYPE html>
<html lang="en">
    
<head>
        <meta charset="UTF-8">
        <title>Oily Business</title>
        <link rel="icon" href="/assets/favicon.png" type="image/png">
        <link rel="stylesheet" href="style.css?v=1.1.6">
    </head>
    <body>

        <!-- -------------------NAVIGATION/ UI AT TOP --------->
        <header class="top-navbar"> 
            <div class="nav-button" id="btn-money">
                <span class="nav-text">
                    Money $
                    <span id="money-count" class="money-count">0.00</span>
                </span>
            </div>
            
            <!-- -------------------OIL PANEL ------------------- -->
            <div class="oil-container">
                <div class="nav-button" id="btn-oil">
                    <img src="assets/oil.png" alt="Oil Icon" class="nav-icon">
                    <span class="nav-text">
                        Oil  <span id="oil-count" class="oil-count">0/10</span>
                    </span>
                </div>

                <div class="oil-sell-panel" id="oil-sell-panel">
                    <div class="oil-price-row">
                        Current Price/Oil:
                        <span id="oil-price-value">$78.50</span>
                    </div>


                    <button id="sell-oil-btn" class="sell-oil-btn">
                        Sell All Oil
                    </button>
                </div>
            </div>

            <div class="nav-button heat-button" id="btn-heat">
                <img src="assets/heat.png" alt="Heat Icon" class="nav-icon">
                <span class="nav-text">Heat</span>
            </div>

            <div class="nav-button" id="btn-achievement">
                <img src="assets/achievements.png" alt="Achievement Icon" class="nav-icon">
                <span class="nav-text">Advancements</span>
            </div>

            <div class="nav-button" id="btn-settings">
                <img src="assets/settings.png" alt="Settings Icon" class="nav-icon">
                <span class="nav-text">Settings</span>
            </div>

        </header>

        </div>

        <!-- ------------ UPGRADES PANEL ---------------- -->
         <aside class="upgrades-panel" id="upgrades-panel">
            <button class="upgrades-toggle" id="upgrades-toggle" type="button" aria-label = "Toggle Upgrades Panel">></button>
            <div class="upgrades-content" id="upgrades-content"></div>
        </aside>

        <!-- ------------ SPINNY WHEEL + RIG + Auto toggle--------------- -->
        <main class="game-container">
            <div class="wheel-container">
                <img src="assets/rig.png" id="oil-rig-base" alt="Oil Rig Base" draggable="false">
                <img src="assets/rig2.png" id="oil-rig-extended" alt="Oil Rig Extended" draggable="false">
                <img src="assets/wheel.png" id="spin-wheel" alt="Spinning Wheel" draggable="false">
            </div>
        </main>

        <div id="auto-toggle-container" style="display: none; justify-content: center; margin-top: 20px; position: relative; z-index: 10;">
                <button id="btn-auto-toggle" class="sell-oil-btn" style="margin: 0;">Auto Spin: OFF</button>
        </div>

        <!-- -------------- BOTTOM BUTTONS ----------------- -->
        <div class="bottom-controls">
            <div class="nav-button" id="btn-save">
                <span class="nav-text">Save Game</span>
            </div>
            <div class="nav-button" id="btn-load">
                <span class="nav-text">Load Game</span>
            </div>
            <input type="file" id="file-load" accept=".dat" style="display: none;">
        </div>

        <!-- -------------- CREDITS BUTTON ----------------- -->
        <button class="credits-btn" id="btn-credits">Credits</button>

        <div class="credits-overlay" id="credits-overlay">
            <div class="credits-modal">
                <button class="credits-close" id="credits-close">✕</button>
                <h2 class="credits-title">Credits</h2>
                <ul class="credits-list">
                    <li><span class="credits-role">Development</span><span class="credits-name">Elijah Spitzer</span></li>
                    <li><span class="credits-role">Design</span><span class="credits-name">Jack Jacobson</span></li>
                    <li><span class="credits-role">Music</span><span class="credits-name">Ruben Sutton</span></li>
                    <li><span class="credits-role">Art</span><span class="credits-name">Elizabeth</span></li>
                    <li><span class="credits-role">UI</span><span class="credits-name">Komal</span></li>
                </ul>
            </div>
        </div>

        <div class="settings-overlay" id="settings-overlay">
            <div class="settings-modal">
                <button class="settings-close" id="settings-close">✕</button>
                <h2 class="settings-title">Settings</h2>
                <div class="settings-actions">
                    <button class="settings-action-btn" id="settings-music-toggle" type="button">Mute Music</button>
                    <label class="settings-slider-row" for="settings-music-volume">
                        <span class="settings-slider-label">Volume</span>
                        <input class="settings-slider" id="settings-music-volume" type="range" min="0" max="100" value="70">
                    </label>
                </div>
            </div>
        </div>

        <div class="advancements-overlay" id="advancements-overlay">
            <div class="advancements-modal">
                <button class="advancements-close" id="advancements-close">✕</button>
                <h2 class="advancements-title">Advancements</h2>
                <p class="advancements-copy">Track the next milestones in your rig's progression.</p>
                <div class="advancements-list" id="advancements-list"></div>
            </div>
        </div>
        
        <script src="ui.js?v=1.1.7"></script>
    </body>
</html>
