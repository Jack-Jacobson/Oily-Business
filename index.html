<!DOCTYPE html>
<html lang="en">
    
<head>
        <meta charset="UTF-8">
        <title>Oily Business</title>
        <link rel="stylesheet" href="style.css?v=1.0.7">
    </head>
    <body>

        <!-- -------------------NAVIGATION/ UI AT TOP --------->
        <header class="top-navbar"> 
            <div class="nav-button" id="btn-money">
                <span class="nav-text">
                    Money $
                    <span id="money-count" class="money-count">0.00</span>
                </span>
            </div>

            <div class="nav-button" id="btn-oil">
                <img src="assets/oil.png" alt="Oil Icon" class="nav-icon">
                <span class="nav-text">Oil Stored <span id="oil-count" class="oil-count">0</span></span>
            </div>

            <div class="nav-button heat-button" id="btn-heat">
                <img src="assets/heat.png" alt="Heat Icon" class="nav-icon">
                <span class="nav-text">Heat</span>
            </div>

            <div class="nav-button" id="btn-achievement">
                <img src="assets/achievements.png" alt="Achievement Icon" class="nav-icon">
                <span class="nav-text">Achievements</span>
            </div>

            <div class="nav-button" id="btn-settings">
                <img src="assets/settings.png" alt="Settings Icon" class="nav-icon">
                <span class="nav-text">Settings</span>
            </div>

        </header>

        <!-- -------------------OIL PANEL ------------------- -->
            <div class="oil-sell-panel" id="oil-sell-panel">
            <div class="oil-price-row">
                Current Price/Oil:
                <span id="oil-price-value">$78.50</span>
            </div>

            <button id="sell-oil-btn" class="sell-oil-btn">
                Sell All Oil
            </button>
        </div>

        <!-- ------------ UPGRADES PANEL ---------------- -->
         <aside class="upgrades-panel" id="upgrades-panel">
            <button class="upgrades-toggle" id="upgrades-toggle" type="button" aria-label = "Toggle Upgrades Panel">></button>
            <div class="upgrades-content"></div>
        </aside>

        <!-- ------------ SPINNY WHEEL + RIG --------------- -->
        <main class="game-container">
            <div class="wheel-container">
                <img src="assets/rig.png" id="oil-rig" alt="Oil Rig" draggable="false">
                <img src="assets/wheel.png" id="spin-wheel" alt="Spinning Wheel" draggable="false">
            </div>
        </main>

        <script src="ui.js?v=1.0.7"></script>
    </body>
</html>
