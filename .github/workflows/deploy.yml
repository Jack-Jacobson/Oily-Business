name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          git config --global --add safe.directory /var/www/oilybusiness
          
          cd /var/www/oilybusiness/
          
          if [ ! -d ".git" ]; then
            git init
            git remote add origin https://github.com/Jack-Jacobson/Oily-Business.git
          else
            git remote set-url origin https://github.com/Jack-Jacobson/Oily-Business.git
          fi
          
          git fetch origin main
          
          git reset --hard origin/main
          
          sudo systemctl restart nginx
          sudo systemctl restart cloudflared