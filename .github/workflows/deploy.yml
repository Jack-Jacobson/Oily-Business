name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          git config --global --add safe.directory /var/www/oilybusiness
          
          cd /var/www/oilybusiness/
          
          if [ ! -d ".git" ]; then
            git init
          fi
          
          git remote remove origin 2>/dev/null || true
          git remote add origin https://github.com/Jack-Jacobson/Oily-Business.git
          
          git fetch origin main
          git reset --hard origin/main

          sudo systemctl restart nginx || true
          echo "nginx exit code: $?"

          sudo systemctl restart cloudflared || true
          echo "cloudflare exit code: $?"

          true